<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="880" height="240" rx="10" fill="#0d1117"/>
  <text x="440" y="32" fill="#e6edf3" font-size="16" font-weight="600" text-anchor="middle">How "open Spotify" is handled</text>

  <g>
    <rect x="24" y="92" width="150" height="56" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="99" y="116" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">You say</text>
    <text x="99" y="135" fill="#8b949e" font-size="12" text-anchor="middle">"open Spotify"</text>
  </g>
  <path d="M174 120 h34" stroke="#58a6ff" stroke-width="1.6"/>
  <path d="M208 120 l-8 -5 v10 z" fill="#58a6ff"/>

  <g>
    <polygon points="210,120 300,88 390,120 300,152" fill="#161b22" stroke="#58a6ff"/>
    <text x="300" y="116" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">Is the app</text>
    <text x="300" y="132" fill="#e6edf3" font-size="12.5" font-weight="600" text-anchor="middle">installed?</text>
  </g>

  <path d="M390 120 h150" stroke="#50fa7b" stroke-width="1.6"/>
  <path d="M540 120 l-8 -5 v10 z" fill="#50fa7b"/>
  <text x="460" y="112" fill="#50fa7b" font-size="12" text-anchor="middle">Yes (Store or desktop)</text>
  <g>
    <rect x="542" y="92" width="150" height="56" rx="8" fill="#161b22" stroke="#50fa7b"/>
    <text x="617" y="124" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Opens the app</text>
  </g>

  <path d="M300 152 v40 h240" stroke="#8b949e" stroke-width="1.6" fill="none"/>
  <path d="M540 192 l-8 -5 v10 z" fill="#8b949e"/>
  <text x="330" y="182" fill="#8b949e" font-size="12">No</text>
  <g>
    <rect x="542" y="164" width="150" height="56" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="617" y="188" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Opens on the web</text>
    <text x="617" y="206" fill="#8b949e" font-size="11.5" text-anchor="middle">(web app or a search)</text>
  </g>

  <text x="717" y="124" fill="#8b949e" font-size="11.5">← used most wins</text>
  <text x="440" y="230" fill="#8b949e" font-size="12" text-anchor="middle">Say "download Spotify" to install it instead. Nothing is bought or booked for you.</text>
</svg>
