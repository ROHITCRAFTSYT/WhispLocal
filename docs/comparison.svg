<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="880" height="300" rx="10" fill="#0d1117"/>
  <text x="440" y="34" fill="#e6edf3" font-size="16" font-weight="600" text-anchor="middle">WhispLocal vs typical cloud dictation</text>

  <rect x="470" y="52" width="196" height="230" rx="10" fill="#0f2419" stroke="#2ea043"/>
  <text x="568" y="76" fill="#7ee787" font-size="14" font-weight="700" text-anchor="middle">WhispLocal</text>
  <text x="770" y="76" fill="#8b949e" font-size="14" font-weight="600" text-anchor="middle">Cloud tools</text>

  <g font-size="13">
    <text x="40" y="112" fill="#c9d1d9">Where your audio goes</text>
    <text x="568" y="112" fill="#7ee787" text-anchor="middle">Your CPU</text>
    <text x="770" y="112" fill="#8b949e" text-anchor="middle">Their servers</text>

    <text x="40" y="146" fill="#c9d1d9">Works offline</text>
    <text x="568" y="146" fill="#7ee787" text-anchor="middle">Yes</text>
    <text x="770" y="146" fill="#8b949e" text-anchor="middle">No</text>

    <text x="40" y="180" fill="#c9d1d9">Cost</text>
    <text x="568" y="180" fill="#7ee787" text-anchor="middle">Free, open source</text>
    <text x="770" y="180" fill="#8b949e" text-anchor="middle">Usually monthly</text>

    <text x="40" y="214" fill="#c9d1d9">Your transcripts and history</text>
    <text x="568" y="214" fill="#7ee787" text-anchor="middle">Stay on disk</text>
    <text x="770" y="214" fill="#8b949e" text-anchor="middle">Uploaded</text>

    <text x="40" y="248" fill="#c9d1d9">Open apps, play music, notes</text>
    <text x="568" y="248" fill="#7ee787" text-anchor="middle">Built in</text>
    <text x="770" y="248" fill="#8b949e" text-anchor="middle">Varies</text>
  </g>

  <line x1="40" y1="124" x2="840" y2="124" stroke="#21262d"/>
  <line x1="40" y1="158" x2="840" y2="158" stroke="#21262d"/>
  <line x1="40" y1="192" x2="840" y2="192" stroke="#21262d"/>
  <line x1="40" y1="226" x2="840" y2="226" stroke="#21262d"/>

  <text x="440" y="290" fill="#8b949e" font-size="11.5" text-anchor="middle">The only time WhispLocal uses the network is a one-time model download.</text>
</svg>
