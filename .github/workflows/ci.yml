name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
      - name: Compile all modules
        run: python -m py_compile whisp/adaptive.py whisp/app.py whisp/audio.py whisp/cleanup.py whisp/commands.py whisp/configio.py whisp/inject.py whisp/obsidian.py whisp/overlay.py whisp/settings.py whisp/transcriber.py whisp/tray.py warmup.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
