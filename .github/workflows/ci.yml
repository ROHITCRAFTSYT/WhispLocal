name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4.4.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"
      - name: Compile all modules
        run: python -m py_compile whisp/adaptive.py whisp/app.py whisp/audio.py whisp/cleanup.py whisp/commands.py whisp/configio.py whisp/inject.py whisp/obsidian.py whisp/overlay.py whisp/settings.py whisp/transcriber.py whisp/tray.py warmup.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
